name: Deploy Pentol Nona

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Deploy to Docker
              run: |
                  cd /home/pentolnona.com/public_html/
                  git fetch --all
                  git reset --hard origin/main
                  git pull origin main
                  docker compose down
                  docker compose up -d --build
                  docker image prune -f

            - name: Fix Permissions
              run: |
                  chown -R pento6765:pento6765 /home/pentolnona.com/public_html
